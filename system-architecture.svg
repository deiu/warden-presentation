<svg viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs>
        <style>
            @import url('https://api.fontshare.com/v2/css?f[]=general-sans@700,600,500,400&amp;display=swap');
        </style>
        <marker id="ag" viewBox="0 0 8 8" refX="6.5" refY="4"
                markerWidth="5" markerHeight="5" orient="auto">
            <path d="M1,1 L7,4 L1,7 Z" fill="#b8b0a6"/>
        </marker>
        <marker id="aa" viewBox="0 0 8 8" refX="6.5" refY="4"
                markerWidth="5" markerHeight="5" orient="auto">
            <path d="M1,1 L7,4 L1,7 Z" fill="#d97706"/>
        </marker>
    </defs>

    <!-- ── ROW 1: CLIENT SURFACES ── -->
    <rect x="10" y="8" width="175" height="40" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="97" y="24" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9.5" font-weight="700" fill="#0d1117">Warden App</text>
    <text x="97" y="39" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7.5" fill="#64748b">Browser · Cloudflare CDN · SSE (HTTPS)</text>

    <rect x="670" y="8" width="180" height="40" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="760" y="24" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9.5" font-weight="700" fill="#0d1117">Warden Studio</text>
    <text x="760" y="39" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7.5" fill="#64748b">Browser · 3rd party devs</text>

    <!-- ── ROW 2: EDGE + BACKEND ── -->
    <rect x="10" y="63" width="300" height="52" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="160" y="80" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="8" font-weight="700" fill="#0d1117">Cloudflare (DDoS) → AWS ALB (LB)</text>
    <text x="160" y="95" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9" font-weight="600" fill="#d97706">API Gateway (TypeScript)</text>
    <text x="160" y="108" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">DDoS · auth · routing · Privy wallet ops</text>

    <rect x="555" y="63" width="295" height="52" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="702" y="80" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="8" font-weight="700" fill="#0d1117">Cloudflare (DDoS) → AWS ALB (LB)</text>
    <text x="702" y="95" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9" font-weight="600" fill="#d97706">Agent Registration Service</text>
    <text x="702" y="108" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">public · agent onboarding · dev portal</text>

    <!-- ── ROW 3: DATA + SHARED + EXTERNAL ── -->
    <rect x="10" y="132" width="100" height="38" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="60" y="149" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9" font-weight="700" fill="#0d1117">Redis</text>
    <text x="60" y="162" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">cache · leaderboard</text>

    <rect x="122" y="132" width="188" height="38" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="216" y="149" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9" font-weight="700" fill="#0d1117">PostgreSQL</text>
    <text x="216" y="162" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">primary + 1 read replica · user data · activity</text>

    <rect x="322" y="132" width="160" height="38" rx="3" fill="rgba(217,119,6,0.08)" stroke="rgba(217,119,6,0.22)" stroke-width="1"/>
    <text x="402" y="149" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9" font-weight="700" fill="#d97706">Payment Service</text>
    <text x="402" y="162" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">shared · treasury · credit escrow</text>

    <rect x="494" y="132" width="120" height="38" rx="3" fill="#eef2f6" stroke="#d0d7e2" stroke-width="1"/>
    <text x="554" y="149" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9" font-weight="600" fill="#4a5568">Privy</text>
    <text x="554" y="162" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">wallet mgmt · webhooks</text>

    <rect x="626" y="132" width="224" height="38" rx="3" fill="#eef2f6" stroke="#d0d7e2" stroke-width="1"/>
    <text x="738" y="149" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9" font-weight="600" fill="#4a5568">3rd Party Agent APIs</text>
    <text x="738" y="162" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">marketplace agents</text>

    <!-- ── ROW 4: LANGSMITH AGENT RUNTIME ── -->
    <rect x="10" y="186" width="840" height="100" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1.5"/>
    <text x="18" y="199" font-family="'General Sans',sans-serif" font-size="7.5" font-weight="700" fill="#b8b0a6" letter-spacing="0.14em">LANGSMITH</text>
    <text x="440" y="199" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#b8b0a6">deployment platform · distributed traces · agent observability</text>

    <rect x="20" y="203" width="390" height="72" rx="2" fill="rgba(217,119,6,0.08)" stroke="rgba(217,119,6,0.22)" stroke-width="1"/>
    <text x="215" y="221" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9.5" font-weight="700" fill="#d97706">Internal Agents</text>
    <text x="215" y="237" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7.5" fill="#64748b">Venice.ai (primary) · OpenAI · Grok · OpenAI SDK</text>
    <text x="215" y="252" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7.5" fill="#64748b">tool calls · HiTL confirm · PoI emission</text>
    <text x="215" y="266" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#b8b0a6">direct treasury payment on completion</text>

    <rect x="430" y="203" width="410" height="72" rx="2" fill="rgba(217,119,6,0.08)" stroke="rgba(217,119,6,0.22)" stroke-width="1"/>
    <text x="635" y="221" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="9.5" font-weight="700" fill="#d97706">Wrapper Agent</text>
    <text x="635" y="237" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7.5" fill="#64748b">proxies 3rd party APIs · guardrails · identity check</text>
    <text x="635" y="252" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7.5" fill="#64748b">PoI emission · credit escrow (collect → hold → release)</text>
    <text x="635" y="266" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#b8b0a6">payment released to 3rd party wallet on completion</text>

    <!-- ── ROW 5: TRUST LAYER + EVENT PIPELINE ── -->
    <rect x="10" y="303" width="380" height="46" rx="3" fill="rgba(217,119,6,0.10)" stroke="rgba(217,119,6,0.30)" stroke-width="1.5"/>
    <text x="200" y="321" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="10" font-weight="700" fill="#d97706">Warden Chain</text>
    <text x="200" y="337" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7.5" fill="#64748b">PoI Smart Contract · ERC-8004 Identity Registry</text>

    <rect x="406" y="303" width="112" height="46" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="462" y="320" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="8" font-weight="600" fill="#0d1117">Ingestion Svc</text>
    <text x="462" y="333" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">webhook endpoint</text>
    <text x="462" y="343" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#b8b0a6">Privy events</text>

    <rect x="530" y="303" width="106" height="46" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="583" y="320" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="8" font-weight="600" fill="#0d1117">RabbitMQ</text>
    <text x="583" y="333" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">fan-out queue</text>
    <text x="583" y="343" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#b8b0a6">consumers</text>

    <rect x="648" y="303" width="106" height="46" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="701" y="320" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="8" font-weight="600" fill="#0d1117">ClickHouse</text>
    <text x="701" y="333" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">event analytics</text>

    <rect x="766" y="303" width="84" height="46" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="808" y="320" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="8" font-weight="600" fill="#0d1117">Metabase</text>
    <text x="808" y="333" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">BI dashboard</text>

    <!-- ── ROW 6: MONITORING ── -->
    <rect x="10" y="366" width="380" height="36" rx="3" fill="#f3efe9" stroke="#e2ddd6" stroke-width="1"/>
    <text x="200" y="381" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="8.5" font-weight="600" fill="#0d1117">Prometheus · Grafana · LangSmith observability</text>
    <text x="200" y="394" text-anchor="middle" font-family="'General Sans',sans-serif" font-size="7" fill="#64748b">service metrics · agent traces → Slack alerts</text>

    <text x="410" y="381" font-family="'General Sans',sans-serif" font-size="7.5" font-weight="600" fill="#b8b0a6">Infrastructure: AWS</text>

    <!-- ── ARROWS ── -->
    <!-- 1. Warden App → API GW (vertical) -->
    <line x1="97" y1="48" x2="97" y2="61" stroke="#b8b0a6" stroke-width="1.5" marker-end="url(#ag)"/>

    <!-- 2. Warden Studio → Agent Reg (vertical) -->
    <line x1="760" y1="48" x2="760" y2="61" stroke="#b8b0a6" stroke-width="1.5" marker-end="url(#ag)"/>

    <!-- 3. API GW → Redis (dashed, cache reads) -->
    <line x1="60" y1="115" x2="60" y2="130" stroke="#b8b0a6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ag)"/>

    <!-- 4. API GW → LangSmith Internal Agents (amber, main runtime invocation) -->
    <line x1="215" y1="115" x2="215" y2="184" stroke="#d97706" stroke-width="2" marker-end="url(#aa)"/>

    <!-- 5. API GW → Payment Service (L: right edge of GW → down → left edge of Payment) -->
    <path d="M310,89 L316,89 L316,151 L322,151" stroke="#b8b0a6" stroke-width="1" fill="none" marker-end="url(#ag)"/>

    <!-- 6. Agent Reg → Payment Service (dashed L: left edge of Reg → down → right edge of Payment) -->
    <path d="M555,89 L549,89 L549,151 L484,151" stroke="#b8b0a6" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#ag)"/>

    <!-- 7. Agent Reg → LangSmith Wrapper Agent (amber, runtime path for marketplace agents) -->
    <line x1="702" y1="115" x2="635" y2="184" stroke="#d97706" stroke-width="1.5" marker-end="url(#aa)"/>

    <!-- 8. Wrapper Agent → 3rd Party APIs (dashed, upward — Wrapper calls 3P APIs) -->
    <line x1="738" y1="203" x2="738" y2="172" stroke="#b8b0a6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ag)"/>

    <!-- 9. LangSmith → Warden Chain (amber, PoI emission + payment settlement) -->
    <line x1="215" y1="286" x2="200" y2="301" stroke="#d97706" stroke-width="2" marker-end="url(#aa)"/>


    <!-- 11. Privy → Ingestion Svc (dashed L-path: down then left then down) -->
    <path d="M554,170 L554,281 L462,281 L462,301" stroke="#b8b0a6" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#ag)"/>

    <!-- 12. Ingestion → RabbitMQ -->
    <line x1="518" y1="326" x2="528" y2="326" stroke="#b8b0a6" stroke-width="1.5" marker-end="url(#ag)"/>

    <!-- 13. RabbitMQ → ClickHouse -->
    <line x1="636" y1="326" x2="646" y2="326" stroke="#b8b0a6" stroke-width="1.5" marker-end="url(#ag)"/>

    <!-- 14. ClickHouse → Metabase -->
    <line x1="754" y1="326" x2="764" y2="326" stroke="#b8b0a6" stroke-width="1.5" marker-end="url(#ag)"/>
</svg>
